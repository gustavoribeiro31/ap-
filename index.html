<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas da Casa</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --card-bg: #fff;
            --primary: #4a90e2;
            --secondary: #8e44ad;
            --tertiary: #e67e22;
            --quaternary: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
        }

        .cycle-info {
            background-color: #e0e6ed;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #555;
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 6px solid #ccc;
        }

        .card h2 {
            margin: 0 0 15px 0;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card ul {
            margin: 0;
            padding-left: 20px;
        }

        .card li {
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .card[data-person="Gustavo"] { border-color: var(--primary); }
        .card[data-person="Rodrigo"] { border-color: var(--secondary); }
        .card[data-person="Danilo"] { border-color: var(--tertiary); }
        .card[data-person="Beatriz"] { border-color: var(--quaternary); }

        .folga {
            color: #27ae60;
            font-weight: bold;
            list-style-type: none;
            margin-left: -20px;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.85em;
            color: #777;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Limpeza da Casa</h1>
        <div class="cycle-info" id="cycle-dates">Carregando ciclo...</div>
    </div>

    <div class="grid" id="chores-grid">
    </div>

    <div class="footer-note">
        A escala roda automaticamente toda quarta-feira.
    </div>

    <script>
        const people = ["Gustavo", "Rodrigo", "Danilo", "Beatriz"];

        function getLastWednesday(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = (day >= 3) ? (day - 3) : (day + 4);
            d.setDate(d.getDate() - diff);
            d.setHours(0, 0, 0, 0);
            return d;
        }

        function formatDate(date) {
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
        }

        function renderApp() {
            const today = new Date();
            const lastWednesday = getLastWednesday(today);
            
            const nextWednesday = new Date(lastWednesday);
            nextWednesday.setDate(nextWednesday.getDate() + 7);

            document.getElementById('cycle-dates').innerText = 
                `Ciclo atual: ${formatDate(lastWednesday)} até ${formatDate(nextWednesday)}`;

            const weekIndex = Math.floor(lastWednesday.getTime() / (7 * 24 * 60 * 60 * 1000));

            // Verifica se a semana é par ou ímpar (semana sim, semana não)
            const isPanosWeek = (weekIndex % 2 === 0);

            // Os blocos são definidos dinamicamente de acordo com a semana
            const choreBlocks = [
                ["Lavar banheiro"],
                ["Limpar cozinha"],
                isPanosWeek ? ["Lavar panos de cozinha", "Lavar panos de chão"] : ["<span class='folga'>Semana de folga! 🎉</span>"],
                ["Passar aspirador na sala/sacada", "Recolher lixos e levar na lixeira"]
            ];

            const grid = document.getElementById('chores-grid');
            grid.innerHTML = '';

            people.forEach((person, index) => {
                const blockIndex = (index + weekIndex) % choreBlocks.length;
                const assignedChores = choreBlocks[blockIndex];

                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-person', person);

                let listHTML = assignedChores.map(chore => `<li>${chore}</li>`).join('');

                card.innerHTML = `
                    <h2>${person}</h2>
                    <ul>
                        ${listHTML}
                    </ul>
                `;
                
                grid.appendChild(card);
            });
        }

        renderApp();
    </script>
</body>
</html>
